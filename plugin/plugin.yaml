apiVersion: plugger/v1
name: policy-gitops
version: 0.3.0
image: policy-gitops:latest

schedule:
  mode: daemon

env:
  - name: GIT_REPO_URL
    required: true
  - name: GIT_TOKEN
    required: true
  - name: GIT_BRANCH
    required: false
    default: "main"
  - name: GIT_PROVIDER
    required: false
    default: "github"
  - name: SYNC_MODE
    required: false
    default: "export"
  - name: SCAN_INTERVAL
    required: false
    default: "3600"
  - name: AUTO_PROVISION
    required: false
    default: "false"
  - name: DRIFT_ALERT
    required: false
    default: "true"
  - name: EXPORT_AS_PR
    required: false
    default: "false"
  - name: EXPORT_LABELS
    required: false
    default: "false"
  - name: DRIFT_AUTO_PR
    required: false
    default: "false"
  - name: PCE_TLS_SKIP_VERIFY
    required: false
    default: "true"

health:
  endpoint: /healthz
  port: 8080
  interval: 30s
  timeout: 5s
  retries: 3

resources:
  memoryLimit: 512m
  cpuLimit: "1.0"
