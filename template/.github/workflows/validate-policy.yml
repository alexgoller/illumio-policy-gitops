name: Validate Policy Change

on:
  pull_request:
    branches: [main]
    paths:
      - 'scopes/**'
      - 'ip-lists/**'
      - 'services/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Policy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install illumio pyyaml requests

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- scopes/ ip-lists/ services/)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          COUNT=$(echo "$CHANGED" | grep -c '.' || true)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: YAML lint
        if: steps.changes.outputs.count != '0'
        run: |
          python3 -c "
          import os, yaml, sys
          errors = []
          for f in '''${{ steps.changes.outputs.files }}'''.strip().split('\n'):
              f = f.strip()
              if not f or not f.endswith(('.yaml', '.yml')):
                  continue
              if not os.path.exists(f):
                  continue  # deleted in this PR — nothing to lint
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('YAML lint errors:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          print('All YAML files valid')
          "

      - name: Security check
        id: security
        if: steps.changes.outputs.count != '0'
        run: |
          python3 .github/scripts/security-check.py \
            --changed-files "${{ steps.changes.outputs.files }}" \
            --output security-report.json
        continue-on-error: true

      - name: Label validation
        id: labelcheck
        if: steps.changes.outputs.count != '0'
        env:
          PCE_HOST: ${{ secrets.PCE_HOST }}
          PCE_PORT: ${{ secrets.PCE_PORT }}
          PCE_ORG_ID: ${{ secrets.PCE_ORG_ID }}
          PCE_API_KEY: ${{ secrets.PCE_API_KEY }}
          PCE_API_SECRET: ${{ secrets.PCE_API_SECRET }}
        run: |
          python3 .github/scripts/label-check.py \
            --changed-files "${{ steps.changes.outputs.files }}" \
            --output label-check-report.json
        continue-on-error: true

      - name: Cross-scope mirror check
        id: mirrorcheck
        if: steps.changes.outputs.count != '0'
        run: |
          python3 .github/scripts/mirror-check.py \
            --changed-files "${{ steps.changes.outputs.files }}" \
            --output mirror-check-report.json
        continue-on-error: true

      - name: Traffic evidence
        id: traffic
        if: steps.changes.outputs.count != '0'
        env:
          PCE_HOST: ${{ secrets.PCE_HOST }}
          PCE_PORT: ${{ secrets.PCE_PORT }}
          PCE_API_KEY: ${{ secrets.PCE_API_KEY }}
          PCE_API_SECRET: ${{ secrets.PCE_API_SECRET }}
        run: |
          python3 .github/scripts/traffic-evidence.py \
            --changed-files "${{ steps.changes.outputs.files }}" \
            --lookback-days 30 \
            --diff-base origin/main \
            --output traffic-report.json
        continue-on-error: true

      - name: Policy resolution
        id: resolution
        if: steps.changes.outputs.count != '0'
        env:
          PCE_HOST: ${{ secrets.PCE_HOST }}
          PCE_PORT: ${{ secrets.PCE_PORT }}
          PCE_ORG_ID: ${{ secrets.PCE_ORG_ID }}
          PCE_API_KEY: ${{ secrets.PCE_API_KEY }}
          PCE_API_SECRET: ${{ secrets.PCE_API_SECRET }}
        run: |
          python3 .github/scripts/policy-resolve.py \
            --changed-files "${{ steps.changes.outputs.files }}" \
            --blast-radius-warn 50 \
            --blast-radius-block 500 \
            --output policy-resolution.json
        continue-on-error: true

      - name: Firewall change request
        id: fwchange
        if: steps.changes.outputs.count != '0'
        run: |
          python3 .github/scripts/fw-change-request.py \
            --resolution policy-resolution.json \
            --changed-files "${{ steps.changes.outputs.files }}" \
            --diff-base origin/main \
            --commit "${{ github.event.pull_request.head.sha }}" \
            --pr-title "${{ github.event.pull_request.title }}" \
            --out-dir fw-changes
        continue-on-error: true

      - name: Commit firewall change request to PR branch
        if: steps.changes.outputs.count != '0' && steps.fwchange.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fw-changes/
          git diff --staged --quiet || \
            git commit -m "chore: update firewall change request [skip ci]" && \
            git push origin HEAD:${{ github.head_ref }}

      - name: Render report
        if: steps.changes.outputs.count != '0'
        run: |
          python3 .github/scripts/render-report.py \
            --security security-report.json \
            --traffic traffic-report.json \
            --resolution policy-resolution.json \
            --label-check label-check-report.json \
            --mirror-check mirror-check-report.json \
            --changed-files "${{ steps.changes.outputs.files }}" \
            --diff-base origin/main \
            --output pr-comment.md

      - name: Post PR comment
        if: steps.changes.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Policy Change Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on blocking findings
        if: steps.changes.outputs.count != '0'
        run: |
          BLOCKED=0
          if [ "${{ steps.security.outcome }}" = "failure" ]; then
            echo "Critical security findings detected"
            BLOCKED=1
          fi
          if [ -f label-check-report.json ]; then
            MISSING=$(python3 -c "import json; d=json.load(open('label-check-report.json')); print(len(d.get('missing', [])))")
            if [ "$MISSING" != "0" ]; then
              echo "Missing label references detected: $MISSING"
              BLOCKED=1
            fi
          fi
          if [ -f mirror-check-report.json ]; then
            MISSING=$(python3 -c "import json; d=json.load(open('mirror-check-report.json')); print(len(d.get('missing', [])))")
            if [ "$MISSING" != "0" ]; then
              echo "Missing cross-scope mirror files: $MISSING"
              BLOCKED=1
            fi
          fi
          if [ -f policy-resolution.json ]; then
            BLAST=$(python3 -c "import json; d=json.load(open('policy-resolution.json')); print('1' if d.get('has_blast_block') else '0')")
            if [ "$BLAST" = "1" ]; then
              echo "Blast radius threshold exceeded"
              BLOCKED=1
            fi
          fi
          if [ "$BLOCKED" = "1" ]; then
            echo "PR blocked — see Policy Change Report comment for details"
            exit 1
          fi
