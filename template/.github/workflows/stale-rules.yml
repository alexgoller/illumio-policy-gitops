name: Stale Rule Detection

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  stale-rules:
    name: Detect Stale Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install illumio pyyaml requests

      - name: Detect stale rules
        env:
          PCE_HOST: ${{ secrets.PCE_HOST }}
          PCE_PORT: ${{ secrets.PCE_PORT }}
          PCE_ORG_ID: ${{ secrets.PCE_ORG_ID }}
          PCE_API_KEY: ${{ secrets.PCE_API_KEY }}
          PCE_API_SECRET: ${{ secrets.PCE_API_SECRET }}
        run: |
          python3 .github/scripts/stale-rules.py \
            --lookback-days 90 \
            --output stale-rules-report.json

      - name: Open issues for stale rules / close resolved ones
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('stale-rules-report.json')) {
              console.log('No stale-rules-report.json found — skipping');
              return;
            }
            const report = JSON.parse(fs.readFileSync('stale-rules-report.json', 'utf8'));
            if (report.skipped) {
              console.log(`Skipped: ${report.reason}`);
              return;
            }

            const LABEL = 'stale-rule';

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: LABEL,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: LABEL, color: 'e4e669',
                description: 'Rule with no matching traffic in 90 days',
              });
            }

            // Fetch all open stale-rule issues
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: LABEL, state: 'open', per_page: 100,
            });

            const staleRules = report.stale_rules || [];
            const staleKeys = new Set(staleRules.map(r => `${r.file}::${r.rule_name}`));

            // Close issues for rules that are no longer stale (traffic recovered)
            for (const issue of openIssues) {
              const match = issue.body?.match(/\*\*File:\*\* `(.+)`[\s\S]*?\*\*Rule:\*\* `(.+)`/);
              if (!match) continue;
              const key = `${match[1]}::${match[2]}`;
              if (!staleKeys.has(key)) {
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, state: 'closed',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '✅ Traffic detected — this rule is no longer stale. Closing automatically.',
                });
                console.log(`Closed issue #${issue.number} (traffic recovered)`);
              }
            }

            // Open issues for newly stale rules
            const existingTitles = new Set(openIssues.map(i => i.title));
            for (const rule of staleRules) {
              const title = `[stale-rule] ${rule.ruleset_name} / ${rule.rule_name}`;
              if (existingTitles.has(title)) {
                console.log(`Already open: ${title}`);
                continue;
              }
              const body = [
                '## Stale Rule Detected',
                '',
                `**Rule:** \`${rule.rule_name}\``,
                `**Ruleset:** \`${rule.ruleset_name}\``,
                `**File:** \`${rule.file}\``,
                `**Services:** ${rule.services}`,
                '',
                `No matching traffic found in the last **${rule.lookback_days} days**.`,
                '',
                'This rule may no longer be needed. Consider:',
                '- [ ] Verify with the application team that this rule is still required',
                '- [ ] If no longer needed, open a PR to remove it',
                '- [ ] If legitimate (e.g. DR path, seasonal traffic), add a `# stale-ok: reason` comment to the rule in the YAML',
                '',
                '<sub>🤖 Generated by [Illumio Policy GitOps](https://github.com/alexgoller/illumio-policy-gitops)</sub>',
              ].join('\n');

              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: [LABEL],
              });
              console.log(`Opened issue #${issue.number}: ${title}`);
            }

            console.log(`Done: ${staleRules.length} stale rule(s) reported`);
