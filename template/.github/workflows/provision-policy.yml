name: Provision Policy to PCE

on:
  push:
    branches: [main]
    paths:
      - 'scopes/**'
      - 'ip-lists/**'
      - 'services/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  provision:
    name: Provision to PCE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 -- scopes/ ip-lists/ services/)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          COUNT=$(echo "$CHANGED" | grep -c '.' || true)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Setup Python
        if: steps.changes.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.changes.outputs.count != '0'
        run: pip install illumio pyyaml

      - name: Provision to PCE
        id: provision
        if: steps.changes.outputs.count != '0'
        env:
          PCE_HOST: ${{ secrets.PCE_HOST }}
          PCE_PORT: ${{ secrets.PCE_PORT }}
          PCE_ORG_ID: ${{ secrets.PCE_ORG_ID }}
          PCE_API_KEY: ${{ secrets.PCE_API_KEY }}
          PCE_API_SECRET: ${{ secrets.PCE_API_SECRET }}
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
          # Pass the merge commit message as the PCE provision description so
          # the active policy history shows the PR title rather than a generic count.
          PROVISION_DESCRIPTION: ${{ github.event.head_commit.message }}
          # Set to "false" to leave changes in draft for manual review.
          AUTO_PROVISION: "true"
        run: python3 .github/scripts/provision.py
        continue-on-error: true

      - name: Post provision comment on merged PR
        if: steps.changes.outputs.count != '0'
        uses: actions/github-script@v7
        env:
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
        with:
          script: |
            const fs = require('fs');

            // Find the PR that was merged to trigger this push
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            if (!prs.length) {
              console.log('No PR found for commit ' + context.sha + ' — skipping comment');
              return;
            }
            const pr = prs[0];

            // Read the structured report written by provision.py
            let report = {};
            try {
              report = JSON.parse(fs.readFileSync('provision-report.json', 'utf8'));
            } catch (e) {
              console.log('provision-report.json not found, using outcome only');
            }

            const ok = process.env.PROVISION_OUTCOME === 'success';
            const totalChanges = (report.created || 0) + (report.updated || 0) + (report.deleted || 0);
            let statusIcon, statusText;
            if (!ok) {
              statusIcon = '❌';
              statusText = 'Provision failed';
            } else if (totalChanges === 0) {
              statusIcon = 'ℹ️';
              statusText = 'Policy already in sync — nothing to provision';
            } else if (report.provisioned_to_active) {
              statusIcon = '✅';
              statusText = 'Provisioned to PCE active policy';
            } else {
              statusIcon = '⚠️';
              statusText = 'Draft updated — pending activation';
            }

            const commitMsg = context.payload.head_commit?.message?.split('\n')[0] || '';
            const shortSha = context.sha.slice(0, 7);

            const lines = [
              '## 🚀 Provision Status\n',
              `**${statusIcon} ${statusText}**\n`,
              '| | | |',
              '|:---:|---|---|',
              `| ${statusIcon} | Status | ${statusText} |`,
              `| 📝 | Commit | \`${shortSha}\` ${commitMsg} |`,
            ];

            if (report.created !== undefined) {
              if (report.created)  lines.push(`| ➕ | Created  | ${report.created} |`);
              if (report.updated)  lines.push(`| ✏️ | Updated  | ${report.updated} |`);
              if (report.deleted)  lines.push(`| 🗑️ | Deleted  | ${report.deleted} |`);
            }

            if (report.files && report.files.length) {
              lines.push('');
              lines.push('**Files provisioned:**');
              for (const f of report.files) {
                const icon = f.action === 'created' ? '➕' : f.action === 'deleted' ? '🗑️' : '✏️';
                lines.push(`> ${icon} \`${f.file}\` — ${f.name}`);
              }
            }

            if (report.errors && report.errors.length) {
              lines.push('');
              lines.push('**Errors:**');
              for (const e of report.errors.slice(0, 10)) {
                lines.push('> `' + e + '`');
              }
            }

            lines.push('');
            lines.push(
              '<sub>🤖 [Illumio Policy GitOps](https://github.com/alexgoller/illumio-policy-gitops) · ' +
              `[Run #${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})</sub>`
            );

            const body = lines.join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });

            console.log(`Posted provision status on PR #${pr.number}`);

      - name: Regenerate cross-scope docs
        if: steps.changes.outputs.count != '0'
        run: |
          # Provider-centric model: regenerate the read-only requester-side
          # cross-scope/to-<provider>.yaml views from the canonical inbound files.
          python3 .github/scripts/generate-cross-scope-docs.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scopes/
          git diff --staged --quiet || \
            (git commit -m "chore: regenerate cross-scope docs [skip ci]" && git push)

      - name: Update README badges
        if: steps.changes.outputs.count != '0'
        run: |
          python3 .github/scripts/update-badges.py \
            --report provision-report.json \
            --readme README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || \
            (git commit -m "chore: update policy badges [skip ci]" && git push)

      - name: Fail if provision errored
        if: steps.provision.outcome == 'failure'
        run: |
          echo "Provision step failed — see logs above"
          exit 1
