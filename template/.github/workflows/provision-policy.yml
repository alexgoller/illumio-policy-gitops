name: Provision Policy to PCE

on:
  push:
    branches: [main]
    paths:
      - 'scopes/**'
      - 'ip-lists/**'
      - 'services/**'

permissions:
  contents: read

jobs:
  provision:
    name: Provision to PCE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 -- scopes/ ip-lists/ services/)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          COUNT=$(echo "$CHANGED" | grep -c '.' || true)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Setup Python
        if: steps.changes.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.changes.outputs.count != '0'
        run: pip install illumio pyyaml

      - name: Provision to PCE draft
        if: steps.changes.outputs.count != '0'
        env:
          PCE_HOST: ${{ secrets.PCE_HOST }}
          PCE_PORT: ${{ secrets.PCE_PORT }}
          PCE_ORG_ID: ${{ secrets.PCE_ORG_ID }}
          PCE_API_KEY: ${{ secrets.PCE_API_KEY }}
          PCE_API_SECRET: ${{ secrets.PCE_API_SECRET }}
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
          # Pass the merge commit message as the PCE provision description so
          # the active policy history shows the PR title rather than a generic count.
          PROVISION_DESCRIPTION: ${{ github.event.head_commit.message }}
          # Set to "false" to leave changes in draft for manual review.
          AUTO_PROVISION: "true"
        run: python3 .github/scripts/provision.py

      - name: Summary
        if: always()
        run: echo "Provision complete — check PCE active policy"
