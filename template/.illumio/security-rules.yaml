# Security rules for policy validation pipeline
# These rules are evaluated against every changed policy file in a PR.
#
# Fields per rule:
#   id          — unique identifier (SEC-NNN or custom SEC-CUSTOM-NNN)
#   name        — human-readable label shown in PR comments
#   severity    — critical | high | medium
#   action      — block (fails the PR) | warn (comment only)
#   enabled     — set to false to disable without deleting the entry
#   scope_filter — unscoped (only global rulesets) | scoped (only scoped rulesets) | omit for all
#   ports       — list of port numbers this rule checks (for port-based rules)
#   description — explanation shown in PR comments
#
# Exemptions:
#   ruleset_pattern — substring match on ruleset name
#   scope_pattern   — "key=value" match on ruleset scope labels (e.g. "env=dev")
#   exempt_rules    — list of rule IDs to skip for matching rulesets
#   reason          — human-readable justification

rules:
  # CRITICAL — blocks the PR
  - id: SEC-001
    name: "No any-to-any rules"
    severity: critical
    action: block
    scope_filter: unscoped   # ams→ams in a scoped ruleset is intra-scope ringfencing — OK
    description: >
      Rules with 'all workloads' on both providers and consumers in a global (unscoped)
      ruleset defeat micro-segmentation. In a scoped ruleset this is valid ringfencing.

  - id: SEC-002
    name: "No broad port ranges"
    severity: critical
    action: block
    description: "Port ranges exceeding 1000 ports are too permissive"

  - id: SEC-003
    name: "No insecure protocols"
    severity: critical
    action: block
    ports: [21, 23, 69, 513, 514]
    description: "FTP, Telnet, TFTP, rlogin, rsh — use SSH/SFTP instead"

  # HIGH — warns in PR comment
  - id: SEC-004
    name: "Cross-scope rules need justification"
    severity: high
    action: warn
    description: "Extra-scope rules must include a 'justification' field"

  - id: SEC-005
    name: "RDP/SMB restricted"
    severity: high
    action: warn
    ports: [3389, 445]
    description: "RDP and SMB are common lateral movement vectors"

  - id: SEC-006
    name: "Database ports scoped to app tier"
    severity: high
    action: warn
    ports: [5432, 3306, 1433, 1521, 27017]
    description: "Database ports should only be accessible from specific consumer roles"

  # MEDIUM — informational
  - id: SEC-007
    name: "IP List broad CIDR"
    severity: medium
    action: warn
    description: "IP lists with /8 or broader CIDRs are very permissive"

  - id: SEC-008
    name: "Overly broad rule consumer"
    severity: high
    action: warn
    description: >
      Rules with 'All Workloads' (ams) or an Any/RFC-1918 IP list as consumer and no
      role label on the provider side expose every workload to the internet or internal
      broadcast. Add a role label to providers or tighten the consumer definition.

  - id: SEC-009
    name: "HTTP without HTTPS"
    severity: medium
    action: warn
    ports: [80]
    description: "Consider requiring HTTPS (443) instead of HTTP (80)"

  - id: SEC-010
    name: "Extra-scope rule provider-centric placement"
    severity: medium
    action: warn
    description: >
      Scopes are provider-centric: a cross-scope (extra-scope) rule protects the
      provider's workloads, so it must be authored in the provider's scope
      (scopes/app-<provider>_env-<env>/inbound/from-<requester>.yaml). Flags rules
      whose consumer app equals the enclosing scope, or whose providers name a
      different app than the scope. Also flags the deprecated requester/target
      courtesy schema (the requester-side file is generated, not authored).

# Exemptions: bypass specific rules for matching rulesets or scopes
exemptions:
  - ruleset_pattern: "coreservices"
    exempt_rules: [SEC-005]
    reason: "Active Directory requires SMB for domain operations"

  # Example: exempt dev environments from high-severity port warnings
  # - scope_pattern: "env=dev"
  #   exempt_rules: [SEC-005, SEC-006]
  #   reason: "Dev environments have relaxed controls"
